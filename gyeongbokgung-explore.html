<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>경복궁 탐험대</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1b2d;
  --card: #1a2a42;
  --card2: #24385a;
  --gold: #e8b64c;
  --red: #c94f4f;
  --green: #5cb87a;
  --blue: #5a9bd8;
  --text: #f2f0e8;
  --muted: #8fa0b8;
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  min-height: 100vh;
}
.screen { display: none; max-width: 860px; margin: 0 auto; padding: 20px 16px 40px; }
.screen.active { display: block; }

/* ── 타이틀 ── */
.title-wrap { text-align: center; padding-top: 48px; }
.title-wrap h1 { font-size: 34px; font-weight: 900; color: var(--gold); margin-bottom: 8px; }
.title-wrap .sub { font-size: 17px; color: var(--muted); margin-bottom: 32px; }
.big-btn {
  display: block; width: 100%; max-width: 340px; margin: 12px auto;
  min-height: 60px; padding: 16px 20px; font-size: 20px; font-weight: 700;
  font-family: inherit; border: none; border-radius: 16px; cursor: pointer;
  color: #1a1408; background: var(--gold);
}
.big-btn.alt { background: var(--blue); color: #fff; }
.big-btn:disabled { opacity: .4; }

/* ── 탐험 지도 ── */
.map-head { text-align: center; margin-bottom: 14px; }
.map-head h2 { font-size: 22px; color: var(--gold); }
.map-head p { font-size: 15px; color: var(--muted); margin-top: 4px; }
.progress { font-size: 15px; color: var(--green); font-weight: 700; margin-top: 6px; }
.map {
  position: relative; border: 2px solid var(--card2); border-radius: 20px; overflow: hidden;
}
.map img.bg { display: block; width: 100%; height: auto; pointer-events: none; }
.spot {
  position: absolute; transform: translate(-50%, -50%);
  min-height: 44px; padding: 8px 14px;
  background: rgba(26, 42, 66, .92); border: 2px solid var(--gold); border-radius: 999px;
  cursor: pointer; font-family: inherit; color: var(--text);
  font-size: clamp(12px, 2.2vw, 17px); font-weight: 700; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
}
.spot .emo { font-size: 1.1em; margin-right: 2px; }
.spot.visited { border-color: var(--green); background: rgba(28, 51, 40, .92); }
.spot.visited::after { content: " ✓"; color: var(--green); }

/* ── 스팟 상세 ── */
.detail-card {
  background: var(--card); border: 2px solid var(--gold); border-radius: 20px;
  padding: 24px 20px; max-width: 640px; margin: 0 auto;
}
.detail-card .emo { font-size: 44px; text-align: center; display: block; }
.detail-card h2 { font-size: 26px; color: var(--gold); text-align: center; margin: 8px 0 2px; }
.detail-card .hanja { text-align: center; font-size: 15px; color: var(--muted); margin-bottom: 16px; }
.detail-card .role {
  background: var(--card2); border-radius: 12px; padding: 12px 14px;
  font-size: 17px; font-weight: 700; color: var(--blue); margin-bottom: 12px; text-align: center;
}
.detail-card .desc { font-size: 18px; line-height: 1.7; margin-bottom: 12px; }
.detail-card .fun {
  border-left: 4px solid var(--gold); padding: 8px 12px; font-size: 16px;
  color: #f0dcae; background: rgba(232,182,76,.08); border-radius: 0 10px 10px 0;
  margin-bottom: 20px; line-height: 1.6;
}

/* ── 퀴즈 ── */
.quiz-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 16px; }
.quiz-head .score { color: var(--gold); font-weight: 900; font-size: 18px; }
.q-card { background: var(--card); border-radius: 20px; padding: 24px 20px; max-width: 640px; margin: 0 auto; }
.q-type { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
.q-text { font-size: 20px; font-weight: 700; line-height: 1.6; margin-bottom: 20px; }
.choice {
  display: block; width: 100%; min-height: 56px; padding: 14px 16px; margin-bottom: 10px;
  background: var(--card2); border: 2px solid transparent; border-radius: 14px;
  color: var(--text); font-size: 18px; font-family: inherit; text-align: left; cursor: pointer;
}
.choice.correct { border-color: var(--green); background: #1c3328; }
.choice.wrong { border-color: var(--red); background: #3a2224; }
.feedback { min-height: 52px; font-size: 17px; line-height: 1.5; padding: 8px 4px; }
.feedback.good { color: var(--green); }
.feedback.bad { color: #e08a8a; }

/* ── 결과 ── */
.result { text-align: center; padding-top: 40px; }
.result .emo { font-size: 64px; }
.result h2 { font-size: 30px; color: var(--gold); margin: 12px 0 6px; }
.result .msg { font-size: 18px; color: var(--muted); margin-bottom: 8px; }
.result .score-big { font-size: 44px; font-weight: 900; color: var(--text); margin: 16px 0; }
</style>
</head>
<body>

<!-- 타이틀 -->

    <button class="big-btn" onclick="startExplore()">🗺️ 1단계: 궁궐 탐험하기</button>

</div>

    exp:'가운데 높은 길이 임금이 다니는 "어도", 양쪽 길은 신하들이 다녔어요.' },

  { type:'🏛️ 건물의 역할', q:'임금이 잠을 자던 침실은 어디일까요?', a:'강녕전', wrong:['광화문','경회루','사정전'],

let visited = new Set();
let quizOrder = [], qIdx = 0, score = 0;

function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goTitle(){ show('scr-title'); }
function startExplore(){ show('scr-map'); }

function openSpot(id){
  const s = SPOTS[id];
  visited.add(id);
  document.querySelector(`.spot[data-id="${id}"]`).classList.add('visited');
  document.getElementById('progress').textContent = `탐험: ${visited.size} / 9`;
  document.getElementById('detail-card').innerHTML = `
    <span class="emo">${s.emo}</span>
    <h2>${s.name}</h2>
    <div class="hanja">${s.hanja}</div>
    <div class="role">${s.role}</div>
    <div class="desc">${s.desc}</div>
    <div class="fun">${s.fun}</div>`;
  show('scr-detail');
  if(visited.size === 9){ document.getElementById('btn-quiz-start').disabled = false; }
}
function backToMap(){
  show('scr-map');
  if(visited.size === 9){
    document.getElementById('progress').textContent = '탐험 완료! 🎉 처음 화면에서 퀴즈에 도전하세요';
  }
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

function startQuiz(){
  quizOrder = shuffle([...QUIZ]);
  qIdx = 0; score = 0;
  renderQuestion();
  show('scr-quiz');
}

function renderQuestion(){
  const q = quizOrder[qIdx];
  document.getElementById('q-progress').textContent = `문제 ${qIdx+1} / ${quizOrder.length}`;
  document.getElementById('q-score').textContent = `⭐ ${score}점`;
  document.getElementById('q-type').textContent = q.type;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-feedback').textContent = '';
  document.getElementById('q-feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  const choices = shuffle([q.a, ...q.wrong]);
  const box = document.getElementById('q-choices');
  box.innerHTML = '';
  choices.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'choice';
    b.textContent = c;
    b.onclick = ()=>answer(b, c, q);
    box.appendChild(b);
  });
}

function answer(btn, choice, q){
  document.querySelectorAll('.choice').forEach(b=>b.onclick=null);
  const fb = document.getElementById('q-feedback');
  if(choice === q.a){
    btn.classList.add('correct');
    score += 10;
    fb.className = 'feedback good';
    fb.textContent = '⭕ 정답! ' + q.exp;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{ if(b.textContent===q.a) b.classList.add('correct'); });
    fb.className = 'feedback bad';
    fb.textContent = '❌ 아쉬워요! ' + q.exp;
  }
  document.getElementById('q-score').textContent = `⭐ ${score}점`;
  document.getElementById('btn-next').style.display = 'block';
}

function nextQuestion(){
  qIdx++;
  if(qIdx < quizOrder.length){ renderQuestion(); }
  else { showResult(); }
}

function showResult(){
  const max = quizOrder.length * 10;
  const rate = score / max;
  let emo, title, msg;
  if(rate === 1){ emo='👑'; title='궁궐 박사!'; msg='경복궁을 완벽하게 정복했어요!'; }
  else if(rate >= .7){ emo='🏯'; title='훌륭한 탐험가!'; msg='경복궁의 비밀을 거의 다 알아냈어요!'; }
  else if(rate >= .4){ emo='🚶'; title='성장하는 탐험가'; msg='지도로 돌아가서 한 번 더 탐험해 볼까요?'; }
  else { emo='🗺️'; title='탐험 다시 출발!'; msg='건물 설명을 다시 읽고 도전하면 훨씬 잘할 수 있어요!'; }
  document.getElementById('r-emo').textContent = emo;
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-score').textContent = `${score}점 / ${max}점`;
  document.getElementById('r-msg').textContent = msg;
  show('scr-result');
}
</script>
